name: keep-render-awake

on:
  schedule:
    - cron: "*/5 * * * *" # every 5 minutes
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Render (health and root)
        run: |
          URL=https://restaurant-website-a2i9.onrender.com
          curl -fsS "$URL/api/health" || true
          curl -fsS "$URL/" || true
